title: GEANRAMOS.COM
email: geancr10@gmail.com
description: Apenas mais um Blog bacana para um car*lh*
baseurl: ""
url: "https://blog.geanramos.com.br"
github_username:  geanramos

permalink: /:slug.html

favicon: "favicon.png"
goat_counter: " " # put your GoatCounter name if you want to use GoatCounter analytics

# Build settings
remote_theme: geanramos/no-style-please

theme_config:
  appearance: "light" # can be "light", "dark" or "auto"
  back_home_text: "home" # customize text for homepage link in post layout
  date_format: "%d-%m-%Y" # customize how date is formatted
  show_description: false # show blog description in home page

plugins:
  - jekyll-feed
  - jekyll-seo-tag

include:
  - _pages

# Exclude from processing.
